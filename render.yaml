# Schema documented at https://render.com/docs/yaml-spec

# Updated to support isolated WebSocket architecture

services:

    # REST API Service (Flask)
    - type: web
      region: frankfurt
      name: tastebook-api
      env: python
      buildCommand: "./render_build_api.sh"
      startCommand: "gunicorn --bind 0.0.0.0:$PORT wsgi:application --chdir ./src/"
      plan: free
      numInstances: 1
      envVars:
          - key: VITE_BASENAME
            value: /
          - key: FLASK_APP
            value: src/app.py
          - key: FLASK_DEBUG
            value: 0
          - key: FLASK_APP_KEY
            value: "any key works"
          - key: PYTHON_VERSION
            value: "3.13.4"
          - key: DATABASE_URL
            fromDatabase:
                name: postgresql-db-tastebook
                property: connectionString
          - key: SOCKET_SERVER_URL
            value: https://tastebook-websocket.onrender.com
          - key: JWT_SECRET_KEY
            generateValue: true

    # WebSocket Service (Separate)
    - type: web
      region: frankfurt
      name: tastebook-websocket
      env: python
      buildCommand: "./render_build_websocket.sh"
      startCommand: "gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT socket_wsgi:application --chdir ./src/"
      plan: free
      numInstances: 1
      envVars:
          - key: SOCKET_PORT
            value: 10000
          - key: FLASK_DEBUG
            value: 0
          - key: PYTHON_VERSION
            value: "3.13.4"

databases:
    - name: postgresql-db-tastebook
      region: frankfurt
      ipAllowList: []
      plan: free
