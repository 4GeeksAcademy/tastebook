# Updated to support isolated WebSocket architecture


# Extra startCommands for WebSocket service:
      # startCommand: "cd src && gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT socket_wsgi:application --timeout 60 --keep-alive 30 --max-requests 1000 --preload"
      # startCommand: "gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT socket_wsgi:application --chdir ./src/ --timeout 60 --keep-alive 30"
      # startCommand: "gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT socket_wsgi:application --chdir ./src/ --timeout 60 --keep-alive 30"
      # startCommand: "gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT socket_wsgi:application --chdir ./src/"
      # startCommand: "gunicorn --bind 0.0.0.0:$PORT wsgi:application"

services:

    # REST API Service (Flask)
    - type: web
      region: frankfurt
      name: tastebook-webapp
      env: python
      buildCommand: "./render_build_api.sh"
      startCommand: "gunicorn --bind 0.0.0.0:$PORT wsgi:application --chdir ./src/ --log-level info --access-logfile - --error-logfile -"
      plan: free
      numInstances: 1
      envVars:
          - key: VITE_BASENAME
            value: /
          - key: FLASK_APP
            value: src/app.py
          - key: FLASK_DEBUG # if it is 1, it will run a dev environment and serve "generate_sitemap(app)" instead of the React frontend - check "app.py"
            value: 0
          - key: FLASK_APP_KEY
            value: "any key works"
          - key: VITE_BACKEND_URL
            value: https://tastebook-webapp.onrender.com
          - key: PYTHON_VERSION
            value: "3.13.4"
          - key: DATABASE_URL
            fromDatabase:
                name: postgresql-db-tastebook
                property: connectionString
          - key: SOCKET_SERVER_URL
            value: https://tastebook-websocket.onrender.com
          - key: VITE_SOCKET_URL
            value: https://tastebook-websocket.onrender.com
          - key: JWT_SECRET_KEY
            generateValue: true
          - key: CLOUDINARY_CLOUD_NAME
            value: ""
          - key: CLOUDINARY_API_KEY
            value: ""
          - key: CLOUDINARY_API_SECRET
            value: ""
          - key: PYTHONUNBUFFERED
            value: 1

    # WebSocket Service (Separate)
    - type: web
      region: frankfurt
      name: tastebook-websocket
      env: python
      buildCommand: "./render_build_websocket.sh"
      startCommand: "cd src && gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT socket_wsgi:application --timeout 120 --keep-alive 2 --log-level info --access-logfile - --error-logfile -"
      plan: free
      numInstances: 1
      envVars:
          - key: FLASK_DEBUG
            value: 0
          - key: PYTHON_VERSION
            value: "3.13.4"
          - key: EVENTLET_HUB
            value: poll
          - key: PYTHONUNBUFFERED
            value: 1

databases:
    - name: postgresql-db-tastebook
      region: frankfurt
      ipAllowList: []
      plan: free
